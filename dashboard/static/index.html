<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scalper Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="title">
        <span class="dot" id="statusDot"></span>
        <span>SCALPER DASHBOARD</span>
      </div>
      <div class="meta">
        <span id="statusText">CONNECTING...</span>
        <span class="sep">|</span>
        <span id="timestamp">--:--:--</span>
      </div>
    </header>

    <section class="summary">
      <div class="card">
        <div class="label">EQUITY</div>
        <div class="value" id="equity">$--</div>
      </div>
      <div class="card">
        <div class="label">CASH</div>
        <div class="value" id="cash">$--</div>
      </div>
      <div class="card">
        <div class="label">DEPLOYED</div>
        <div class="value" id="deployed">$--</div>
      </div>
      <div class="card">
        <div class="label">TODAY P&L</div>
        <div class="value" id="todayPnl">$--</div>
      </div>
      <div class="card">
        <div class="label">OPEN P&L</div>
        <div class="value" id="openPnl">$--</div>
      </div>
      <div class="card">
        <div class="label">TRADES</div>
        <div class="value" id="tradeStats">--</div>
      </div>
    </section>

    <section class="main-grid">
      <div class="panel">
        <h2>OPEN POSITIONS <span class="count" id="openCount">0</span></h2>
        <div id="positions" class="positions-list">
          <div class="empty">No open positions</div>
        </div>
      </div>

      <div class="panel">
        <h2>MARKET CONTEXT</h2>
        <div class="market" id="market">
          <div class="mkt-row"><span class="mkt-label">SPY</span><span class="mkt-val" id="spyPrice">$--</span><span class="mkt-change" id="spyChange">--</span></div>
          <div class="mkt-row"><span class="mkt-label">VIX</span><span class="mkt-val" id="vix">--</span></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>CLOSED TODAY <span class="count" id="closedCount">0</span></h2>
      <div id="closed" class="closed-list">
        <div class="empty">No closed trades yet</div>
      </div>
    </section>

    <section class="panel">
      <h2>LIVE LOG</h2>
      <div id="log" class="log"></div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
